<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f0a1e"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#312e81"/></linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/><stop offset="100%" stop-color="#065f46" stop-opacity="0.6"/></linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="400" height="260" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="398" height="258" rx="15" fill="none" stroke="url(#accent)" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Game viewport -->
  <rect x="40" y="22" width="320" height="170" rx="10" fill="url(#sky)" opacity="0.6"/>
  <rect x="41" y="23" width="318" height="168" rx="9" fill="none" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Stars -->
  <circle cx="80" cy="44" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="150" cy="52" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="220" cy="38" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="290" cy="48" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="330" cy="35" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="110" cy="62" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="260" cy="58" r="1" fill="#fbbf24" opacity="0.5"/>

  <!-- Moon -->
  <circle cx="310" cy="55" r="14" fill="#fbbf24" opacity="0.12"/>
  <circle cx="310" cy="55" r="10" fill="#fde68a" opacity="0.15"/>

  <!-- Ground / platforms -->
  <rect x="40" y="155" width="320" height="37" rx="0" fill="url(#ground)"/>
  <!-- Platform 1 -->
  <rect x="90" y="125" width="70" height="10" rx="3" fill="#10b981" opacity="0.35"/>
  <rect x="90" y="125" width="70" height="2" rx="1" fill="#34d399" opacity="0.4"/>
  <!-- Platform 2 -->
  <rect x="220" y="105" width="80" height="10" rx="3" fill="#10b981" opacity="0.35"/>
  <rect x="220" y="105" width="80" height="2" rx="1" fill="#34d399" opacity="0.4"/>
  <!-- Platform 3 -->
  <rect x="140" y="82" width="55" height="10" rx="3" fill="#10b981" opacity="0.3"/>
  <rect x="140" y="82" width="55" height="2" rx="1" fill="#34d399" opacity="0.35"/>

  <!-- Player character (pixel hero) -->
  <rect x="108" y="108" width="14" height="16" rx="2" fill="#f59e0b" opacity="0.85"/>
  <rect x="110" y="110" width="4" height="3" rx="1" fill="#0d1117"/>
  <rect x="116" y="110" width="4" height="3" rx="1" fill="#0d1117"/>
  <rect x="109" y="124" width="5" height="5" rx="1" fill="#d97706" opacity="0.7"/>
  <rect x="116" y="124" width="5" height="5" rx="1" fill="#d97706" opacity="0.7"/>

  <!-- Coins -->
  <circle cx="235" cy="95" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="250" cy="95" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="265" cy="95" r="5" fill="#fbbf24" opacity="0.7"/>
  <text x="235" y="98" text-anchor="middle" fill="#92400e" font-size="7" font-weight="bold">$</text>
  <text x="250" y="98" text-anchor="middle" fill="#92400e" font-size="7" font-weight="bold">$</text>
  <text x="265" y="98" text-anchor="middle" fill="#92400e" font-size="7" font-weight="bold">$</text>

  <!-- Enemy (slime) -->
  <ellipse cx="270" cy="148" rx="12" ry="8" fill="#ef4444" opacity="0.5"/>
  <circle cx="266" cy="145" r="2" fill="#0d1117" opacity="0.7"/>
  <circle cx="274" cy="145" r="2" fill="#0d1117" opacity="0.7"/>

  <!-- Flag -->
  <line x1="340" y1="130" x2="340" y2="155" stroke="#a3a3a3" stroke-width="1.5"/>
  <polygon points="340,130 355,136 340,142" fill="#ef4444" opacity="0.7"/>

  <!-- HUD elements -->
  <rect x="50" y="30" width="44" height="14" rx="4" fill="#000" opacity="0.4"/>
  <text x="55" y="40" fill="#f59e0b" font-family="monospace" font-size="8" opacity="0.8">♥ ♥ ♥</text>
  <rect x="104" y="30" width="50" height="14" rx="4" fill="#000" opacity="0.4"/>
  <text x="109" y="40" fill="#fbbf24" font-family="monospace" font-size="8" opacity="0.8">★ 2400</text>

  <!-- Controller icon glow -->
  <circle cx="200" cy="210" r="18" fill="#f59e0b" opacity="0.06"/>

  <!-- Text -->
  <text x="200" y="215" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600" opacity="0.9">Pluto v.2</text>
  <text x="200" y="237" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="11" opacity="0.6">Drag &amp; Drop • 2D Platform</text>
</svg>
